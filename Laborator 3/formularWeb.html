<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <input type="nume" placeholder="Introdu numele">
    <input type="email" placeholder="Introdu adresa de email">
    <input type="varsta" placeholder="Introdu varsta">
    </form>

    <button onclick="submitForm()">Submit</button>
    <script>
        function submitForm() {
            var nume = document.querySelector('input[type="nume"]').value;
            var email = document.querySelector('input[type="email"]').value;
            var varsta = document.querySelector('input[type="varsta"]').value;

            var obiect = {
                nume: nume,
                email: email,
                varsta: varsta
            };
            
            console.log(obiect);
        }
    </script>
</body>
</html>
